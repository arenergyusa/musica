version: '3.8'

services:
  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      network: host
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://api.musica.localhost/api/v1
    depends_on:
      - backend
    networks:
      - musica_net
    restart: unless-stopped

  # Go Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      - SERVER_PORT=8080
      - DATABASE_URL=postgres://musica:musica_password@db:5432/musica_db?sslmode=disable
      - REDIS_URL=redis:6379
      - JWT_SECRET=supersecretjwtkey_replace_me
      - ENVIRONMENT=production
    depends_on:
      - db
      - redis
    networks:
      - musica_net
    restart: unless-stopped

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=musica
      - POSTGRES_PASSWORD=musica_password
      - POSTGRES_DB=musica_db
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./database/data:/var/lib/postgresql/data
    networks:
      - musica_net
    restart: unless-stopped

  # Redis Cache & Session
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - musica_net
    restart: unless-stopped

  # Nginx API Gateway
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      # - "443:443" # For production with SSL
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - musica_net
    restart: unless-stopped

  # Database UI Viewer (Like Prisma Studio)
  adminer:
    image: adminer
    ports:
      - "127.0.0.1:8081:8080"
    depends_on:
      - db
    networks:
      - musica_net
    restart: unless-stopped

volumes:
  redisdata:

networks:
  musica_net:
    driver: bridge
